{% with messages = get_flashed_messages() %}
    {% if messages %}
        {% for msg in messages %}
            <div class="alert alert-warning alert-dismissible fade show animate__animated animate__bounceIn" role="alert">
                💬 {{ msg }}
                <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
            </div>
        {% endfor %}
    {% endif %}
{% endwith %}

<h2>创建新故事</h2>
<form method="POST" hx-post="/story/create" hx-target="#main-content" hx-swap="innerHTML">
  <div class="mb-3">
    <label>故事标题</label>
    <input name="title" class="form-control" required>
  </div>
  <div class="mb-3">
    <label>开头段落（支持 Markdown 语法）</label>
    <textarea name="content" class="form-control" rows="8" required></textarea>
  </div>
  <div class="mb-3">
    <label>备注（可选，如角色说明、心情等）</label>
    <input type="text" name="note" class="form-control" placeholder="可以在这里写点感想...">
  </div>

  <!-- 标签选择 -->
  <div class="mb-3">
    <label class="form-label fw-semibold">标签 <small class="text-muted">(最多选7个)</small></label>
    <input type="text" id="tag-search" class="form-control mb-2" placeholder="🔍 搜索标签..." autocomplete="off">
    <div class="row" id="tag-list">
      {% for tag in all_tags %}
        <div class="col-4 col-md-3 col-lg-2 tag-item">
          <div class="form-check">
            <input class="form-check-input" type="checkbox" name="tags" value="{{ tag.id }}" id="tag{{ tag.id }}">
            <label class="form-check-label" for="tag{{ tag.id }}">{{ tag.name }}</label>
          </div>
        </div>
      {% endfor %}
    </div>
    <div class="form-text">选出与故事相关的标签，方便读者找到你的故事。</div>
  </div>

  <button type="submit" class="btn btn-primary">创建</button>
</form>

<script>
(function() {
    const searchInput = document.getElementById('tag-search');
    if (!searchInput) return;
    
    const tagItems = document.querySelectorAll('.tag-item');
    
    searchInput.addEventListener('input', function() {
        const keyword = this.value.trim().toLowerCase();
        
        tagItems.forEach(item => {
            const label = item.querySelector('label');
            if (!label) return;
            const tagName = label.textContent.toLowerCase();
            if (keyword === '' || tagName.includes(keyword)) {
                item.style.display = '';
            } else {
                item.style.display = 'none';
            }
        });
    });
})();
</script>
